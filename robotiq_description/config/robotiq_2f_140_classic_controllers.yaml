controller_manager:
  ros__parameters:
    update_rate: 500  # Hz
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    robotiq_gripper_controller:
      type: position_controllers/GripperActionController

robotiq_gripper_controller:
  ros__parameters:
    joint: finger_joint
    use_effort_interface: false
    use_speed_interface: false
